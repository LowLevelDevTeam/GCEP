name: C++ Vulkan CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: Build, Lint, Test on ${{ matrix.os }} (${{ matrix.build_type }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
        compiler: [clang]

    env:
      CMAKE_BUILD_TYPE: ${{ matrix.build_type }}

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Vulkan & build tools
      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y build-essential clang-tidy clang-format git

      - name: Install Dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: 1.4.304.1
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true

      # Setup Ninja build tool
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      # Get the LLVM binaries in the PATH environnement variables
      - name: Add LLVM to PATH
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "C:\Program Files\LLVM\bin" >> $GITHUB_PATH
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH
          else
            echo "/usr/bin" >> $GITHUB_PATH
          fi

      # Run clang-format (lint)
      - name: Run clang-format
        shell: bash
        run: |
          for f in $(git ls-files '*.cpp' '*.h'); do
            clang-format "$f"
          done

      # --- Uncomment this part when any cpp file arrives ---
      # Run clang-tidy (static analysis)
      # - name: Run clang-tidy
      #   run: |
      #     mkdir -p build
      #     cd build
      #     cmake -DCMAKE_EXPORT_COMPILE_COMMANDS=ON ..
      #     cd ..
      #     clang-tidy -p build $(git ls-files '*.cpp')

      # Configure project with CMake
      - name: Configure CMake
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      # Build project
      - name: Build
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }}

      # Run tests
      - name: Run Unit Tests
        run: |
          cd build
          ctest --output-on-failure

      # Upload test results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.build_type }}
          path: build/Testing/Temporary

      # Upload compiled binaries
      - name: Upload Artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.build_type }}
          path: build/